version: '3.8'

# NOTE: This docker-compose file uses the OLD Dockerfile locations (Dockerfile.mdns, etc.)
# For the NEW setup with individual Dockerfiles in each folder, use the batch scripts instead.
# See run-all-devices.bat or individual run scripts in mDNS/, SSDP/, MQTT/ folders.

services:
  # mDNS Generic IoT Device
  mdns-generic:
    build:
      context: ./mDNS
      dockerfile: Dockerfile
    image: autosecure-mdns-generic
    network_mode: bridge
    restart: unless-stopped

  # mDNS HomeKit Device
  mdns-homekit:
    build:
      context: ./mDNS
      dockerfile: Dockerfile
    image: autosecure-mdns-homekit
    command: python -u homekit_device.py
    network_mode: bridge
    restart: unless-stopped

  # SSDP Generic Device
  ssdp-generic:
    build:
      context: ./SSDP
      dockerfile: Dockerfile
    image: autosecure-ssdp-generic
    network_mode: bridge
    restart: unless-stopped

  # MQTT Mosquitto Broker
  mqtt-mosquitto:
    build:
      context: ./MQTT
      dockerfile: Dockerfile
    image: autosecure-mqtt-mosquitto
    network_mode: bridge
    ports:
      - "1883:1883"
    restart: unless-stopped

  # MQTT HiveMQ Broker
  mqtt-hivemq:
    build:
      context: ./MQTT
      dockerfile: Dockerfile
    image: autosecure-mqtt-hivemq
    command: python -u hivemq_broker.py
    network_mode: bridge
    ports:
      - "8883:8883"
      - "8000:8000"
    restart: unless-stopped

  # MQTT EMQX Broker
  mqtt-emqx:
    build:
      context: ./MQTT
      dockerfile: Dockerfile
    image: autosecure-mqtt-emqx
    command: python -u emqx_broker.py
    network_mode: bridge
    ports:
      - "8884:8884"
      - "18083:18083"
    restart: unless-stopped
